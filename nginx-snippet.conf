# ─── Add this to your existing nginx config ─────────────────────────────────
# This lets you access the game at: http://yourip/monopoly/
# Or if you have a domain: https://yourdomain.com/monopoly/

# Option A: Subdirectory (add inside your existing server block)
location /monopoly/ {
    proxy_pass http://localhost:3456/;
    proxy_http_version 1.1;

    # WebSocket upgrade — REQUIRED for multiplayer
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_cache_bypass $http_upgrade;
}

