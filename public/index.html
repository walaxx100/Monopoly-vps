<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Worldwide — Monopoly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --border: #cbd5e1;
    --text: #1e293b;
    --accent: #4f46e5;
    --success: #10b981;
    --danger: #ef4444;
    
    /* Colores de Propiedades */
    --brown: #78350f; --teal: #06b6d4; --yellow: #eab308;
    --purple: #a855f7; --orange: #f97316; --red: #e11d48;
    --pink: #ec4899; --blue: #2563eb; --green: #16a34a;
    --darkgreen: #064e3b; --lightblue: #7dd3fc;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Nunito', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; overflow: hidden;
  }

  /* --- LOGIN & LOBBY (Tu lógica original) --- */
  #setup-container {
    position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
    z-index: 2000; display: flex; align-items: center; justify-content: center;
  }
  .setup-box { background: white; padding: 30px; border-radius: 16px; width: 400px; text-align: center; }
  input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; }
  button.primary { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }

  /* --- LAYOUT DEL JUEGO --- */
  .main-layout { display: none; width: 100%; height: 100%; flex-direction: row; padding: 20px; gap: 20px; }

  /* Sidebar Izquierda: Jugadores y Log */
  .sidebar { width: 300px; display: flex; flex-direction: column; gap: 20px; }
  .panel { background: white; border-radius: 12px; padding: 15px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
  .player-card { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; margin-bottom: 5px; border: 2px solid transparent; }
  .player-card.active { border-color: var(--accent); background: #f5f3ff; }
  #log { height: 200px; overflow-y: auto; font-size: 0.85rem; display: flex; flex-direction: column-reverse; }

  /* --- TABLERO (Grid 11x11 CORREGIDO) --- */
  .board-container { flex: 1; display: flex; align-items: center; justify-content: center; }
  .board {
    display: grid;
    grid-template-columns: repeat(11, 1fr);
    grid-template-rows: repeat(11, 1fr);
    width: min(90vh, 750px);
    height: min(90vh, 750px);
    background: #94a3b8;
    border: 5px solid #475569;
    position: relative;
    gap: 1px;
  }

  .board-center {
    grid-column: 2 / 11; grid-row: 2 / 11;
    background: white; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative;
    background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
    background-size: 20px 20px;
  }

  /* Botón de Dados Central */
  #roll-btn {
    padding: 20px 40px; font-size: 1.5rem; font-weight: 800;
    background: var(--accent); color: white; border: none;
    border-radius: 12px; cursor: pointer;
    box-shadow: 0 6px 0 #3730a3; transition: all 0.1s;
  }
  #roll-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #3730a3; }
  #roll-btn:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; transform: none; }

  /* Casillas */
  .space {
    background: white; position: relative; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: 0.65rem;
    font-weight: 700; text-align: center; border: 1px solid #e2e8f0;
  }

  .color-bar { position: absolute; background: #ccc; }
  
  /* Posicionamiento de barras de color */
  .bottom-row .color-bar { top: 0; left: 0; width: 100%; height: 20%; }
  .top-row .color-bar { bottom: 0; left: 0; width: 100%; height: 20%; }
  .left-col .color-bar { top: 0; right: 0; width: 20%; height: 100%; }
  .right-col .color-bar { top: 0; left: 0; width: 20%; height: 100%; }

  /* Colores */
  .red .color-bar { background: var(--red); }
  .blue .color-bar { background: var(--blue); }
  .green .color-bar { background: var(--green); }
  .yellow .color-bar { background: var(--yellow); }
  .orange .color-bar { background: var(--orange); }
  .pink .color-bar { background: var(--pink); }
  .teal .color-bar { background: var(--teal); }
  .brown .color-bar { background: var(--brown); }

  /* --- TOKENS Y ANIMACIONES --- */
  .player-token {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid white;
    position: absolute; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.4);
    transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
  }

  .toast-msg {
    position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: white; padding: 3px 10px; border-radius: 12px;
    font-size: 0.7rem; animation: floatUp 1.5s forwards;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translate(-50%, 0); }
    20% { opacity: 1; transform: translate(-50%, -10px); }
    100% { opacity: 0; transform: translate(-50%, -30px); }
  }
</style>
</head>
<body>

<div id="setup-container">
  <div class="setup-box" id="login-step">
    <h2>Mr. Worldwide</h2>
    <input type="text" id="username-input" placeholder="Tu nombre">
    <button class="primary" onclick="showLobby()">Entrar</button>
  </div>
  <div class="setup-box" id="lobby-step" style="display:none;">
    <h3>Salas Disponibles</h3>
    <div id="room-list"></div>
    <hr>
    <input type="text" id="new-room-id" placeholder="ID de nueva sala">
    <button class="primary" onclick="joinRoom(document.getElementById('new-room-id').value)">Crear Sala</button>
  </div>
</div>

<div class="main-layout" id="game-ui">
  <div class="sidebar">
    <div class="panel">
      <h3 style="margin-top:0">Jugadores</h3>
      <div id="players-list"></div>
    </div>
    <div class="panel" style="flex:1">
      <h3 style="margin-top:0">Actividad</h3>
      <div id="log"></div>
    </div>
  </div>

  <div class="board-container">
    <div class="board" id="board-grid">
      </div>
  </div>

  <div class="sidebar">
    <div id="action-panel" class="panel" style="display:none">
      <h3 id="action-title">Acción</h3>
      <div id="action-desc"></div>
      <div id="action-btns" style="margin-top:10px; display:grid; gap:5px"></div>
    </div>
  </div>
</div>

<script>
  let ws;
  let myId;
  let gameState;
  let playerName = "";

  function showLobby() {
    playerName = document.getElementById('username-input').value;
    if (!playerName) return alert("Pon un nombre");
    document.getElementById('login-step').style.display = 'none';
    document.getElementById('lobby-step').style.display = 'block';
    connect();
  }

  function connect() {
    // IMPORTANTE: WebSockets nativos como en tu server.js
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${window.location.host}`);

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      switch(data.type) {
        case 'room_list': renderRoomList(data.list); break;
        case 'init': myId = data.playerId; break;
        case 'state_update': handleStateUpdate(data.state); break;
      }
    };
  }

  function joinRoom(roomId) {
    ws.send(JSON.stringify({ type: 'join_room', roomId, playerName }));
    document.getElementById('setup-container').style.display = 'none';
    document.getElementById('game-ui').style.display = 'flex';
  }

  function handleStateUpdate(state) {
    // Animación de dinero antes de actualizar estado
    if (gameState) {
      state.players.forEach(p => {
        const old = gameState.players.find(o => o.id === p.id);
        if (old && p.cash > old.cash) toast(p.id, `+$${p.cash - old.cash} 💰`);
        if (old && p.cash < old.cash) toast(p.id, `-$${old.cash - p.cash} 💸`);
      });
    }
    gameState = state;
    renderBoardOnce();
    updateUI();
  }

  function renderBoardOnce() {
    const grid = document.getElementById('board-grid');
    if (grid.children.length > 0) return; // Solo renderizar una vez

    // 1. Centro
    const center = document.createElement('div');
    center.className = 'board-center';
    center.innerHTML = `
      <div id="dice-area" style="font-size: 3rem; margin-bottom: 10px;">🎲🎲</div>
      <button id="roll-btn" onclick="sendAction('roll_dice')">TIRAR DADOS</button>
      <div id="turn-indicator" style="margin-top:10px; font-weight:800"></div>
    `;
    grid.appendChild(center);

    // 2. Casillas con Grid exacto
    gameState.board.forEach((space, i) => {
      const el = document.createElement('div');
      el.className = `space ${space.type} ${space.color || ''}`;
      el.id = `space-${i}`;

      let row, col, side;
      if (i <= 10) { row = 11; col = 11 - i; side = 'bottom-row'; }
      else if (i <= 20) { col = 1; row = 11 - (i - 10); side = 'left-col'; }
      else if (i <= 30) { row = 1; col = i - 19; side = 'top-row'; }
      else { col = 11; row = i - 29; side = 'right-col'; }

      el.style.gridRow = row;
      el.style.gridColumn = col;
      el.classList.add(side);
      
      el.innerHTML = `
        ${space.color ? '<div class="color-bar"></div>' : ''}
        <div style="padding: 2px">${space.flag || ''} ${space.name}</div>
        ${space.price ? `<div style="color:var(--success)">$${space.price}</div>` : ''}
      `;
      grid.appendChild(el);
    });

    // 3. Tokens
    gameState.players.forEach(p => {
      const token = document.createElement('div');
      token.className = 'player-token';
      token.id = `token-${p.id}`;
      token.style.background = p.color;
      grid.appendChild(token);
    });
  }

  function updateUI() {
    const curPlayer = gameState.players[gameState.currentPlayerIndex];
    const isMyTurn = curPlayer.id === myId;
    
    document.getElementById('roll-btn').disabled = !isMyTurn || gameState.phase !== 'playing' || gameState.pendingAction;
    document.getElementById('turn-indicator').innerText = isMyTurn ? "TU TURNO" : `Turno de ${curPlayer.name}`;
    
    // Mover tokens
    gameState.players.forEach(p => {
      const token = document.getElementById(`token-${p.id}`);
      const space = document.getElementById(`space-${p.position}`);
      if (token && space) {
        const rect = space.getBoundingClientRect();
        const boardRect = document.getElementById('board-grid').getBoundingClientRect();
        const offset = (parseInt(p.id.slice(0,2), 16) % 15); // Offset para que no se tapen
        token.style.top = (rect.top - boardRect.top + 10 + offset) + 'px';
        token.style.left = (rect.left - boardRect.left + 10 + offset) + 'px';
      }
    });

    // Lista de jugadores
    document.getElementById('players-list').innerHTML = gameState.players.map((p, i) => `
      <div class="player-card ${i === gameState.currentPlayerIndex ? 'active' : ''}">
        <div style="width:12px; height:12px; border-radius:50%; background:${p.color}"></div>
        <div style="flex:1"><b>${p.name}</b></div>
        <div style="color:var(--success); font-weight:800">$${p.cash}</div>
      </div>
    `).join('');

    // Panel de Acciones (Comprar, Pagar)
    const actionPanel = document.getElementById('action-panel');
    if (gameState.pendingAction && gameState.pendingAction.playerId === myId) {
      actionPanel.style.display = 'block';
      document.getElementById('action-title').innerText = "Decisión";
      document.getElementById('action-desc').innerText = "Debes tomar una acción sobre esta casilla.";
      // Botones dinámicos según tu lógica de server
      renderActionButtons();
    } else {
      actionPanel.style.display = 'none';
    }

    // Log
    document.getElementById('log').innerHTML = gameState.log.slice(-15).map(l => `<div>${l.msg}</div>`).join('');
  }

  function toast(pid, msg) {
    const token = document.getElementById(`token-${pid}`);
    if (!token) return;
    const t = document.createElement('div');
    t.className = 'toast-msg';
    t.innerText = msg;
    token.appendChild(t);
    setTimeout(() => t.remove(), 1500);
  }

  function sendAction(type, payload = {}) {
    ws.send(JSON.stringify({ type: 'game_action', payload: { type, ...payload } }));
  }

  function renderRoomList(list) {
    const cont = document.getElementById('room-list');
    cont.innerHTML = list.map(r => `
      <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between">
        <span><b>${r.id}</b> (${r.playerCount} jugadores)</span>
        <button onclick="joinRoom('${r.id}')">Unirse</button>
      </div>
    `).join('') || "No hay salas activas.";
  }
</script>
</body>
</html>
